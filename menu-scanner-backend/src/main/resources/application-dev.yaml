# ============================================================
# application-dev.yaml  –  DEVELOPMENT SERVER
# ============================================================
# Points to the shared dev server database.
# Override any value with environment variables:
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
# ============================================================
spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/e_menu_platform
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Hour1819}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    com.emenu: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
