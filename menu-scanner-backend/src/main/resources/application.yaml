# ============================================================
# application.yaml  –  BASE CONFIG (shared across all profiles)
# ============================================================
# To switch environment:
#   profiles.active: local   →  localhost DB, debug logging
#   profiles.active: dev     →  dev server DB
#   profiles.active: prod    →  production DB, minimal logging
# ============================================================
spring:
  application:
    name: cambodia-emenu-platform
  profiles:
    active: local # ← change to "local" or "dev" as needed

  # JPA  – common settings (ddl-auto overridden per profile)
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50

  # Cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1h

# Server
server:
  port: 8080

# JWT
jwt:
  secret: da2bd42bef8f9f957d647ed13571d35b59c7055fb723eacdb05154878da17d77d3180385fc232cab38bded0fc7dbda0d439cc275e91164ade266d64d50633bc7
  expiration: 9999999999
  refresh-token-expiration: 9999999999

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# Telegram
telegram:
  bot:
    token: "8464259107:AAHdIC3EZb_3uID4vnhteY6PYtmO9WGDBjU"
    enabled: true
    group-chat-id: "-1002784141362"

# Application
app:
  name: "Cambodia E-Menu Platform"
  version: "1.0.0"
  description: "Restaurant Management Platform for Cambodia"
  init:
    create-admin: true
    admin-email: "phatmenghor19@gmail.com"
    admin-password: "88889999"
    # Test data now generated via SQL script: test-data-with-freepik-urls.sql
    # Run directly in pgAdmin for instant data population with Freepik images
  security:
    token-cleanup:
      enabled: true
  social:
    telegram:
      bot-token: "8464259107:AAHdIC3EZb_3uID4vnhteY6PYtmO9WGDBjU"
      enabled: true
    google:
      client-id: "${GOOGLE_CLIENT_ID:}"
      client-secret: "${GOOGLE_CLIENT_SECRET:}"
      enabled: true
    facebook:
      app-id: "${FACEBOOK_APP_ID:}"
      app-secret: "${FACEBOOK_APP_SECRET:}"
